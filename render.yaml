services:
  - type: web
    name: gittok-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -e .
    startCommand: uvicorn server.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /docs
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: GITHUB_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: BACKEND_PROXY_SECRET
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
